name: Release

# ⚠️ DO NOT USE for public releases since v0.3.0: this workflow signs AD-HOC,
# which changes the app's TCC identity (users would lose/re-grant permissions)
# and cannot be notarized. Official releases are built locally:
#   scripts/build_app.sh Release && scripts/notarize.sh && gh release create …
#   && scripts/make_appcast.sh   (see BUILDING.md → "Release")
# To use CI for releases, first import the Developer ID cert + notary keychain
# profile as repo secrets and port those steps here.
#
# Manual for now (run from the Actions tab with a tag like "v0.2.0"). Once a GitHub
# runner with Xcode 26 / Swift 6.2 is confirmed working, switch to the tag trigger:
#   on: { push: { tags: ['v*'] } }
# and use ${GITHUB_REF_NAME} instead of the input.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build (ad-hoc signed — Path B, no notarization)
        env:
          SOYLE_SIGN_IDENTITY: "-"
        run: scripts/build_app.sh Release

      - name: Stamp version from the tag
        run: |
          VER="${{ github.event.inputs.tag }}"; VER="${VER#v}"
          PLIST="dist/Talkink.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VER}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" "$PLIST"
          codesign --force --sign - "dist/Talkink.app"
          test -f "dist/Talkink.app/Contents/Resources/mlx-swift_Cmlx.bundle/Contents/Resources/default.metallib"

      - name: Zip (ditto preserves signature + symlinks)
        run: ditto -c -k --keepParent "dist/Talkink.app" "Talkink.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.event.inputs.tag }}" "Talkink.zip" --title "Talkink ${{ github.event.inputs.tag }}" --generate-notes
