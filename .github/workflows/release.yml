name: Release

# Manual for now (run from the Actions tab with a tag like "v0.2.0"). Once a GitHub
# runner with Xcode 26 / Swift 6.2 is confirmed working, switch to the tag trigger:
#   on: { push: { tags: ['v*'] } }
# and use ${GITHUB_REF_NAME} instead of the input.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build (ad-hoc signed — Path B, no notarization)
        env:
          SOYLE_SIGN_IDENTITY: "-"
        run: scripts/build_app.sh Release

      - name: Stamp version from the tag
        run: |
          VER="${{ github.event.inputs.tag }}"; VER="${VER#v}"
          PLIST="dist/Söyle.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VER}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" "$PLIST"
          codesign --force --sign - "dist/Söyle.app"
          test -f "dist/Söyle.app/Contents/Resources/mlx-swift_Cmlx.bundle/Contents/Resources/default.metallib"

      - name: Zip (ditto preserves signature + symlinks)
        run: ditto -c -k --keepParent "dist/Söyle.app" "Soyle.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.event.inputs.tag }}" "Soyle.zip" --title "Söyle ${{ github.event.inputs.tag }}" --generate-notes
