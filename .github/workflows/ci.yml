name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    # Requires an Xcode with Swift 6.2+ (Xcode 26+), because the mlx-audio-swift
    # dependency declares swift-tools-version:6.2. Bump the runner image / xcode-version
    # if the build fails to parse the package manifest.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Söyle.app
        run: scripts/build_app.sh Release

      - name: Verify the Metal library is bundled
        run: |
          test -f "dist/Söyle.app/Contents/Resources/mlx-swift_Cmlx.bundle/Contents/Resources/default.metallib" \
            && echo "default.metallib bundled ✓"
