<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:660px; height:420px; overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% -20%, rgba(118,185,0,.16), transparent 60%),
      radial-gradient(100% 80% at 85% 120%, rgba(70,140,40,.10), transparent 60%),
      #0a0d09;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    position:relative; color:#eef3e9;
  }
  .title {
    position:absolute; top:46px; left:0; right:0; text-align:center;
    font-size:24px; font-weight:700; letter-spacing:-.02em;
  }
  .title em { font-style:italic; font-family:Georgia, serif; font-weight:400;
    background:linear-gradient(120deg,#d9efb2,#8fd400 70%); -webkit-background-clip:text; color:transparent; }
  .subtitle {
    position:absolute; top:82px; left:0; right:0; text-align:center;
    font-size:13px; color:rgba(238,243,233,.55);
  }
  .slot {
    position:absolute; top:168px; width:128px; height:128px; border-radius:30px;
    border:1.5px dashed rgba(255,255,255,.22);
    background:rgba(255,255,255,.035);
  }
  .slot.left  { left:96px; }
  .slot.right { left:436px; border-color:rgba(118,185,0,.45); background:rgba(118,185,0,.06); }
  .arrow {
    position:absolute; top:212px; left:268px; width:124px; height:40px;
  }
  .arrow svg { width:100%; height:100%; }
  .hint {
    position:absolute; top:352px; left:0; right:0; text-align:center;
    font-size:12px; color:rgba(238,243,233,.45);
  }
</style></head>
<body>
  <div class="title">Drag into <em>Applications</em></div>
  <div class="subtitle">then open it from Applications — that’s the whole install.</div>
  <div class="slot left"></div>
  <div class="slot right"></div>
  <div class="arrow">
    <svg viewBox="0 0 124 40" fill="none">
      <path d="M6 20 H104 M104 20 L86 6 M104 20 L86 34"
        stroke="#8fd400" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="hint">Free · open source · your voice never leaves your Mac</div>
</body></html>
